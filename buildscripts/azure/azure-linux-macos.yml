parameters:
  name: ''
  vmImage: ''
  matrix: []

jobs:
- job: ${{ parameters.name }}
  pool:
    vmImage: ${{ parameters.vmImage }}
  strategy:
    matrix:
      ${{ insert }}: ${{ parameters.matrix }}

  steps:
    - script: |
        echo "Installing catchsegv"
        sudo apt-get update -qq
        sudo apt-get install -y glibc-tools
      displayName: 'Install catchsegv (provided by glibc-tools)'
      condition: eq('${{ parameters.name }}', 'Linux')

    - script: |
        set -e
        echo "Installing Miniconda"
        buildscripts/incremental/install_miniconda.sh
        export PATH=$HOME/miniconda3/bin:$PATH
        echo "Setting up Conda environment"
        buildscripts/incremental/setup_conda_environment.sh
      displayName: 'Before Install'

    - script: |
        set -e
        export PATH=$HOME/miniconda3/bin:$PATH
        buildscripts/incremental/build.sh
      displayName: 'Build'

    - script: |
        set -e
        export PATH=$HOME/miniconda3/bin:$PATH
        conda install -y flake8
        flake8 -j auto numba
      displayName: 'Flake8'
      condition: eq(variables['RUN_FLAKE8'], 'yes')

    - script: |
        set -e
        export PATH=$HOME/miniconda3/bin:$PATH
        conda create -n pyrefly -y python=3.11
        conda run -n pyrefly pip install -r maint/requirements_pyrefly.txt
        conda run -n pyrefly pyrefly check --conda-environment $CONDA_ENV --no-progress-bar --summary=full
      displayName: 'Pyrefly check'
      condition: eq(variables['RUN_PYREFLY'], 'yes')

    - script: |
        set -e
        export PATH=$HOME/miniconda3/bin:$PATH
        conda run -n $CONDA_ENV pip install -r maint/stubtest/requirements_stubtest.txt
        conda run -n $CONDA_ENV python maint/stubtest.py
      displayName: 'Stubtest'
      condition: eq(variables['RUN_STUBTEST'], 'yes')

    - script: |
        set -e
        export PATH=$HOME/miniconda3/bin:$PATH
        buildscripts/incremental/test.sh
      displayName: 'Test'
