name: numba_win-64_wheel_builder

on:
  schedule:
    - cron: '0 8 * * 6'  # Saturday 8:00 AM UTC - win-64 wheel
  pull_request:
    paths:
      - .github/workflows/numba_win-64_wheel_builder.yml
      - buildscripts/github/evaluate.py
      - buildscripts/github/test_wheel_contents.py
      - setup.py
  workflow_dispatch:
    inputs:
      llvmlite_wheel_runid:
        description: 'llvmlite wheel workflow run ID (optional)'
        required: false
        type: string

# Add concurrency control
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  ARTIFACT_RETENTION_DAYS: 7
  WHEELS_INDEX_URL: https://pypi.anaconda.org/numba/label/dev/simple

jobs:
  load-matrix:
    runs-on: ubuntu-latest
    outputs:
      build-matrix-json: ${{ steps.load_matrix_json.outputs.build-matrix-json }}
      test-matrix-json: ${{ steps.load_matrix_json.outputs.test-matrix-json }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
      - id: load_matrix_json
        name: Load Workflow Matrix JSON
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_WORKFLOW_INPUT: ${{ toJson(github.event.inputs) }}
          GITHUB_PLATFORM: win-64
          GITHUB_PKG_TYPE: wheel
        run: |
          python buildscripts/github/evaluate.py

  win-64-build:
    name: win-64-build-wheel (py ${{ matrix.python_version_full }}, np ${{ matrix.numpy_build }})
    needs: load-matrix
    runs-on: windows-2025
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        include: ${{ fromJson(needs.load-matrix.outputs.build-matrix-json) }}
      fail-fast: false

    steps:
      - name: Clone repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python_version_full }}
          allow-prereleases: true

      - name: Download llvmlite wheel
        if: inputs.llvmlite_wheel_runid != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: llvmlite-win-64-py${{ matrix.python_major_minor }}
          path: llvmlite_wheels
          run-id: ${{ inputs.llvmlite_wheel_runid }}
          repository: numba/llvmlite
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install build dependencies
        run: |
          if [ "${{ inputs.llvmlite_wheel_runid }}" != "" ]; then
              python -m pip install llvmlite_wheels/*.whl
          else
              python -m pip install -i ${{ env.WHEELS_INDEX_URL }} llvmlite
          fi
          python -m pip install build numpy==${{ matrix.numpy_build }} "setuptools>=69.0.0" wheel tbb==2021.6 tbb-devel==2021.6

      - name: Setup MSVC v14.44 (v143) environment
        run: |
          # Same locator as buildscripts/condarecipe.local/bld.bat: find
          # VS2022 or VS2026 and pin the MSVC v14.44 (v143) toolset, then
          # export the activated environment to the following steps.
          VSINSTALLDIR=$(vswhere.exe -nologo -latest -products '*' -version '[17.0,19.0)' -property installationPath | tr -d '\r')
          if [ -z "$VSINSTALLDIR" ]; then
            echo "Could not find VS 2022 or VS 2026"
            exit 1
          fi
          # Quotes inside an inline `cmd //c` argument get mangled between
          # bash and cmd, so activate via a temporary batch file instead.
          {
            printf '@call "%s\\VC\\Auxiliary\\Build\\vcvarsall.bat" x64 -vcvars_ver=14.44 >NUL || exit /b 1\r\n' "$VSINSTALLDIR"
            printf '@set\r\n'
          } > "$RUNNER_TEMP/msvc_env.bat"
          set -o pipefail
          cmd //c "$(cygpath -w "$RUNNER_TEMP/msvc_env.bat")" | tr -d '\r' > "$RUNNER_TEMP/msvc_env.txt"
          grep -iE '^(PATH|INCLUDE|LIB)=' "$RUNNER_TEMP/msvc_env.txt" >> "$GITHUB_ENV"
          # git-bash's login profile prepends Git\usr\bin to PATH in every
          # bash step, so its GNU link.exe would shadow MSVC's linker no
          # matter what PATH we export; remove the shadowing binary.
          rm -f /usr/bin/link.exe

      - name: Build wheel
        env:
          # Use the pre-activated MSVC v14.44 environment instead of
          # setuptools' own discovery, which would pick VS2026's native
          # v14.5x toolset. use 14.44 instead.
          DISTUTILS_USE_SDK: '1'
          MSSdk: '1'
        run: python -m build --wheel --no-isolation

      - name: Test wheel contents
        run: python buildscripts/github/test_wheel_contents.py dist/*.whl

      - name: Upload numba wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: numba_win-64_wheel_py${{ matrix.python_major_minor }}
          path: dist/*.whl
          compression-level: 0
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: error

  win-64-test:
    name: win-64-test-wheel (py ${{ matrix.python_version_full }}, np ${{ matrix.numpy_test }})
    needs: [load-matrix, win-64-build]
    runs-on: windows-2025
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        include: ${{ fromJson(needs.load-matrix.outputs.test-matrix-json) }}
      fail-fast: false

    steps:
      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python_version_full }}
          allow-prereleases: true

      - name: Download Numba wheel artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: numba_win-64_wheel_py${{ matrix.python_major_minor }}
          path: dist

      - name: Download llvmlite wheel
        if: inputs.llvmlite_wheel_runid != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: llvmlite-win-64-py${{ matrix.python_major_minor }}
          path: llvmlite_wheels
          run-id: ${{ inputs.llvmlite_wheel_runid }}
          repository: numba/llvmlite
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate and test wheel
        env:
          NUMBA_CPU_NAME: generic
          _NUMBA_REDUCED_TESTING: 1
        run: |
          # No versioned `which python<ver>` here: Windows setup-python installs
          # only `python.exe` (no python3.14[t]) and it's the sole interpreter,
          # so bare `python` already resolves to the setup-python one.
          python -m pip install --upgrade pip twine
          python -m pip install numpy==${{ matrix.numpy_test }} tbb==2021.6 tbb-devel==2021.6
          if [ "${{ inputs.llvmlite_wheel_runid }}" != "" ]; then
              python -m pip install llvmlite_wheels/*.whl
          else
              python -m pip install --pre -i ${{ env.WHEELS_INDEX_URL }} llvmlite
          fi
          python -m twine check dist/*.whl
          python -m pip install dist/*.whl

          # print Numba system information
          python -m numba -s

          # run tests
          python -m numba.runtests -m 4 -v
